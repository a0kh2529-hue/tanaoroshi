<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>棚卸管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#F5F5F7;color:#1C1C1E;min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid #E5E5EA;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.topbar-actions{display:flex;gap:8px}
.icon-btn-top{width:36px;height:36px;border:none;background:#F2F2F7;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:#1C1C1E}

.save-indicator{font-size:11px;color:#8E8E93;padding:2px 8px;background:#F2F2F7;border-radius:10px;align-self:center;display:none}
.save-indicator.show{display:block}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.metric{background:#fff;border-radius:14px;padding:10px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.metric-val{font-size:20px;font-weight:800;line-height:1}
.metric-val.warn{color:#FF9500}
.metric-val.danger{color:#FF3B30}
.metric-lbl{font-size:10px;color:#8E8E93;margin-top:4px;line-height:1.2}

.alert{background:#FFF3CD;border-left:3px solid #FF9500;margin:0 16px 8px;border-radius:10px;padding:10px 12px;font-size:12px;color:#7A4A00;display:none;gap:6px;align-items:flex-start}
.alert.on{display:flex}

.filters{padding:0 16px 8px;display:flex;gap:8px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;height:40px;padding:0 12px 0 36px;border:none;border-radius:12px;font-size:14px;background:#fff;color:#1C1C1E;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#8E8E93;pointer-events:none}
.filter-btn{height:40px;padding:0 14px;border:none;border-radius:12px;background:#fff;color:#8E8E93;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07);white-space:nowrap}
.filter-btn.active{background:#1C1C1E;color:#fff}

.cat-scroll{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;height:32px;padding:0 14px;border-radius:16px;border:none;background:#fff;color:#8E8E93;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07);white-space:nowrap}
.cat-pill.active{background:#1C1C1E;color:#fff}

.list{padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:100px}
.card{background:#fff;border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.2px}
.card-cat{font-size:11px;color:#8E8E93;margin-top:3px;font-weight:500}
.card-actions{display:flex;gap:6px;margin-top:8px}
.act-btn{height:28px;padding:0 10px;border-radius:8px;border:1px solid #E5E5EA;background:#F2F2F7;font-size:12px;font-weight:600;cursor:pointer;color:#555;display:flex;align-items:center;gap:4px}
.act-btn.del{color:#FF3B30;border-color:#FFCDD2;background:#FFF0F0}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-btn{width:34px;height:34px;border-radius:50%;border:none;background:#F2F2F7;color:#1C1C1E;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;line-height:1}
.qty-btn:active{background:#E5E5EA}
.qty-num{font-size:20px;font-weight:800;min-width:28px;text-align:center;letter-spacing:-0.5px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:700}
.badge-ok{background:#E8F5E9;color:#2E7D32}
.badge-low{background:#FFF3E0;color:#E65100}
.badge-out{background:#FFEBEE;color:#C62828}

.fab{position:fixed;bottom:28px;right:20px;width:58px;height:58px;border-radius:29px;background:#1C1C1E;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);z-index:60;font-weight:300;line-height:1}
.fab:active{transform:scale(0.95)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px 20px 40px;width:100%;max-width:480px}
.modal-handle{width:36px;height:4px;background:#D1D1D6;border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:14px}
.fg label{font-size:13px;color:#8E8E93;display:block;margin-bottom:5px;font-weight:600}
.fg input{width:100%;height:44px;padding:0 14px;border:1px solid #E5E5EA;border-radius:12px;font-size:15px;background:#F2F2F7;color:#1C1C1E}
.fg input:focus{outline:none;border-color:#1C1C1E;background:#fff}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns button{flex:1;height:48px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;border:none}
.btn-cancel{background:#F2F2F7;color:#1C1C1E}
.btn-save{background:#1C1C1E;color:#fff}

.empty{text-align:center;padding:48px 16px;color:#8E8E93;font-size:14px}

/* Toast notification */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1C1C1E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📦 棚卸管理</div>
  <div class="topbar-actions">
    <span class="save-indicator" id="saveIndicator">💾 保存済み</span>
    <button class="icon-btn-top" onclick="exportCSV()" title="CSVエクスポート">⬇️</button>
  </div>
</div>

<div class="metrics" id="metrics"></div>

<div class="alert" id="alertBar">
  <span style="flex-shrink:0">⚠️</span>
  <span id="alertMsg"></span>
</div>

<div class="filters">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="商品名で検索..." oninput="render()">
  </div>
  <button class="filter-btn" id="filterBtn" onclick="cycleStatus()">すべて</button>
</div>

<div class="cat-scroll" id="catScroll"></div>
<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">＋</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">商品を追加</div>
    <div class="fg"><label>商品名 <span style="color:#FF3B30">*</span></label><input type="text" id="fName" placeholder="例: INTENSO"></div>
    <div class="fg"><label>カテゴリ</label><input type="text" id="fCat" placeholder="例: コーヒー"></div>
    <div class="fg"><label>在庫数</label><input type="number" id="fQty" min="0" value="0" inputmode="numeric"></div>
    <div class="fg"><label>最低在庫数（アラート閾値）</label><input type="number" id="fMin" min="0" value="1" inputmode="numeric"></div>
    <div class="fg"><label>単価（円）</label><input type="number" id="fPrice" min="0" value="0" inputmode="numeric"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'tanaoroshi_items_v1';
const NEXTID_KEY  = 'tanaoroshi_nextid_v1';

const defaultItems = [
  {id:9, name:'CAFFE CARAMELLO',cat:'コーヒー',qty:0,min:1,price:0},
  {id:10,name:'INTENSO',cat:'コーヒー',qty:0,min:1,price:0},
  {id:11,name:'RISTRETTO',cat:'コーヒー',qty:0,min:1,price:0},
  {id:12,name:'FORTE',cat:'コーヒー',qty:0,min:1,price:0},
  {id:13,name:'LEGGRO',cat:'コーヒー',qty:0,min:1,price:0},
  {id:14,name:'オリジン コンゴ オーガニック',cat:'コーヒー',qty:0,min:1,price:0},
  {id:15,name:'スターバックス ブロンド エスプレッソ',cat:'コーヒー',qty:0,min:1,price:0},
  {id:16,name:'オリジン ブラジル オーガニック',cat:'コーヒー',qty:0,min:1,price:0},
  {id:17,name:'オリジン グアテマラ',cat:'コーヒー',qty:0,min:1,price:0},
  {id:18,name:'アイス インテンソ',cat:'コーヒー',qty:0,min:1,price:0},
  {id:19,name:'オリジン コロンビア オーガニック',cat:'コーヒー',qty:0,min:1,price:0},
  {id:20,name:'デカフェナート',cat:'コーヒー',qty:0,min:1,price:0},
  {id:21,name:'おしぼり（香りなし）',cat:'おしぼり',qty:0,min:1,price:0},
  {id:22,name:'おしぼり（オレンジ）',cat:'おしぼり',qty:0,min:1,price:0},
  {id:23,name:'おしぼり（グリーン）',cat:'おしぼり',qty:0,min:1,price:0},
];

// ── ストレージ：localStorage → sessionStorage → メモリのみ ──
let _storage = null;
try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); _storage = localStorage; } catch(e) {}
if (!_storage) { try { sessionStorage.setItem('_t','1'); sessionStorage.removeItem('_t'); _storage = sessionStorage; } catch(e) {} }

function loadItems() {
  if (_storage) {
    try {
      const raw = _storage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (p && p.items) return { items: p.items, nextId: p.nextId || 24 };
      }
    } catch(e) {}
  }
  return { items: defaultItems.map(i=>({...i})), nextId: 24 };
}

function loadNextId() { return loadItems().nextId; }

let saveTimer = null;
function persistData() {
  if (_storage) {
    try {
      _storage.setItem(STORAGE_KEY, JSON.stringify({items, nextId}));
    } catch(e) {}
  }
}

const _loaded = loadItems();
let items = _loaded.items;
let nextId = _loaded.nextId;
let editId = null, statusFilter = '', catFilter = '';
const statuses = ['','ok','low','out'];

// ── Toast ──────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function getStatus(i){if(i.qty===0)return'out';if(i.qty<=i.min)return'low';return'ok';}
function badgeHtml(s){
  if(s==='ok')return'<span class="badge badge-ok">✓ 在庫あり</span>';
  if(s==='low')return'<span class="badge badge-low">⚠ 少ない</span>';
  return'<span class="badge badge-out">✕ 在庫切れ</span>';
}

function cycleStatus(){
  const idx=statuses.indexOf(statusFilter);
  statusFilter=statuses[(idx+1)%statuses.length];
  document.getElementById('filterBtn').textContent={'':`すべて`,'ok':'在庫あり','low':'少ない','out':'在庫切れ'}[statusFilter];
  document.getElementById('filterBtn').className='filter-btn'+(statusFilter?' active':'');
  render();
}

function render(){
  const low=items.filter(i=>getStatus(i)==='low');
  const out=items.filter(i=>getStatus(i)==='out');
  const val=items.reduce((s,i)=>s+i.qty*i.price,0);
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-val">${items.length}</div><div class="metric-lbl">総商品数</div></div>
    <div class="metric"><div class="metric-val warn">${low.length}</div><div class="metric-lbl">在庫少ない</div></div>
    <div class="metric"><div class="metric-val danger">${out.length}</div><div class="metric-lbl">在庫切れ</div></div>
    <div class="metric"><div class="metric-val" style="font-size:${val>=10000?'14px':'20px'};padding-top:${val>=10000?'3px':'0'}">¥${val>=10000?(val/10000).toFixed(1)+'万':val.toLocaleString()}</div><div class="metric-lbl">在庫総額</div></div>`;

  const alerts=[...out,...low];
  const bar=document.getElementById('alertBar');
  if(alerts.length){
    bar.classList.add('on');
    const ns=alerts.slice(0,2).map(i=>i.name).join('、');
    const more=alerts.length>2?` 他${alerts.length-2}件`:'';
    document.getElementById('alertMsg').textContent=`要補充: ${ns}${more}`;
  }else bar.classList.remove('on');

  const cats=[...new Set(items.map(i=>i.cat))];
  document.getElementById('catScroll').innerHTML=
    [''].concat(cats).map(c=>`<button class="cat-pill${c===catFilter?' active':''}" onclick="setCat('${c}')">${c||'すべて'}</button>`).join('');

  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=items.filter(i=>
    (!q||i.name.toLowerCase().includes(q))&&
    (!statusFilter||getStatus(i)===statusFilter)&&
    (!catFilter||i.cat===catFilter)
  );
  const list=document.getElementById('list');
  if(!filtered.length){list.innerHTML=`<div class="empty">該当する商品がありません</div>`;return;}
  list.innerHTML=filtered.map(item=>`
    <div class="card">
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-cat">${item.cat}</div>
        <div class="card-actions">
          <button class="act-btn" onclick="editItem(${item.id})">✏️ 編集</button>
          <button class="act-btn del" onclick="deleteItem(${item.id})">🗑 削除</button>
        </div>
      </div>
      <div class="card-right">
        <div class="qty-row">
          <button class="qty-btn" onclick="adj(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="adj(${item.id},1)">＋</button>
        </div>
        ${badgeHtml(getStatus(item))}
      </div>
    </div>`).join('');
}

function setCat(c){catFilter=c;render();}

function adj(id,d){
  const i=items.find(x=>x.id===id);
  if(i){ i.qty=Math.max(0,i.qty+d); persistData(); render(); }
}

function openModal(id=null){
  editId=id;
  document.getElementById('modalTitle').textContent=id?'商品を編集':'商品を追加';
  if(id){const i=items.find(x=>x.id===id);document.getElementById('fName').value=i.name;document.getElementById('fCat').value=i.cat;document.getElementById('fQty').value=i.qty;document.getElementById('fMin').value=i.min;document.getElementById('fPrice').value=i.price;}
  else{document.getElementById('fName').value='';document.getElementById('fCat').value='';document.getElementById('fQty').value=0;document.getElementById('fMin').value=1;document.getElementById('fPrice').value=0;}
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');editId=null;}
function saveItem(){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('fName').focus();return;}
  const d={name,cat:document.getElementById('fCat').value.trim()||'未分類',qty:Math.max(0,parseInt(document.getElementById('fQty').value)||0),min:Math.max(0,parseInt(document.getElementById('fMin').value)||0),price:Math.max(0,parseInt(document.getElementById('fPrice').value)||0)};
  if(editId) Object.assign(items.find(i=>i.id===editId),d);
  else items.push({id:nextId++,...d});
  persistData();
  closeModal();
  render();
  showToast(editId ? '✅ 更新しました' : '✅ 追加しました');
}
function editItem(id){openModal(id);}
function deleteItem(id){
  const i=items.find(x=>x.id===id);
  if(confirm(`「${i.name}」を削除しますか？`)){
    items=items.filter(x=>x.id!==id);
    persistData();
    render();
    showToast('🗑 削除しました');
  }
}

// ── CSVエクスポート（BOM付きUTF-8、確実なダウンロード） ──
function exportCSV(){
  const header = ['商品名','カテゴリ','在庫数','最低在庫数','単価','在庫状態'];
  const rows = items.map(i=>[
    `"${i.name.replace(/"/g,'""')}"`,
    `"${i.cat.replace(/"/g,'""')}"`,
    i.qty,
    i.min,
    i.price,
    `"${getStatus(i)==='ok'?'在庫あり':getStatus(i)==='low'?'少ない':'在庫切れ'}"`
  ]);

  const csvContent = [header, ...rows].map(r=>r.join(',')).join('\r\n');
  // BOM + UTF-8
  const bom = '\uFEFF';
  const blob = new Blob([bom + csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '棚卸_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('📥 CSVをダウンロードしました');
}

document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});
render();
</script>
</body>
</html>
