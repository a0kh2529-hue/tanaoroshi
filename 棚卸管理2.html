<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>棚卸管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#F5F5F7;color:#1C1C1E;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid #E5E5EA;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700}
.icon-btn{width:36px;height:36px;border:none;background:#F2F2F7;border-radius:50%;font-size:16px;cursor:pointer}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.metric{background:#fff;border-radius:14px;padding:10px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.metric-val{font-size:20px;font-weight:800}
.metric-val.warn{color:#FF9500}
.metric-val.danger{color:#FF3B30}
.metric-lbl{font-size:10px;color:#8E8E93;margin-top:4px}
.filters{padding:0 16px 8px;display:flex;gap:8px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;height:40px;padding:0 12px 0 36px;border:none;border-radius:12px;font-size:14px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#8E8E93;pointer-events:none}
.filter-btn{height:40px;padding:0 14px;border:none;border-radius:12px;background:#fff;color:#8E8E93;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07);white-space:nowrap}
.filter-btn.active{background:#1C1C1E;color:#fff}
.cat-scroll{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;height:32px;padding:0 14px;border-radius:16px;border:none;background:#fff;color:#8E8E93;font-size:13px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.cat-pill.active{background:#1C1C1E;color:#fff}
.list{padding:0 16px 100px;display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:11px;color:#8E8E93;margin-top:3px}
.card-actions{display:flex;gap:6px;margin-top:8px}
.act-btn{height:28px;padding:0 10px;border-radius:8px;border:1px solid #E5E5EA;background:#F2F2F7;font-size:12px;font-weight:600;cursor:pointer;color:#555}
.act-btn.del{color:#FF3B30;border-color:#FFCDD2;background:#FFF0F0}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-btn{width:34px;height:34px;border-radius:50%;border:none;background:#F2F2F7;font-size:22px;cursor:pointer;font-weight:300}
.qty-num{font-size:20px;font-weight:800;min-width:28px;text-align:center}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:700}
.badge-ok{background:#E8F5E9;color:#2E7D32}
.badge-low{background:#FFF3E0;color:#E65100}
.badge-out{background:#FFEBEE;color:#C62828}
.fab{position:fixed;bottom:28px;right:20px;width:58px;height:58px;border-radius:29px;background:#1C1C1E;color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.25);z-index:60}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:20px 20px 50px;width:100%;max-width:480px}
.handle{width:36px;height:4px;background:#D1D1D6;border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{font-size:13px;color:#8E8E93;display:block;margin-bottom:5px;font-weight:600}
.field input{width:100%;height:44px;padding:0 14px;border:1px solid #E5E5EA;border-radius:12px;font-size:15px;background:#F2F2F7;color:#1C1C1E;-webkit-appearance:none}
.field input:focus{outline:none;border-color:#1C1C1E;background:#fff}
.sheet-btns{display:flex;gap:10px;margin-top:18px}
.sheet-btns button{flex:1;height:48px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;border:none;-webkit-appearance:none}
.btn-cancel{background:#F2F2F7;color:#1C1C1E}
.btn-save{background:#1C1C1E;color:#fff}
.empty{text-align:center;padding:48px 16px;color:#8E8E93;font-size:14px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1C1C1E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.alert-bar{background:#FFF3CD;border-left:3px solid #FF9500;margin:0 16px 8px;border-radius:10px;padding:10px 12px;font-size:12px;color:#7A4A00;display:none}
.alert-bar.on{display:block}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📦 棚卸管理</div>
  <button class="icon-btn" id="csvBtn">⬇️</button>
</div>

<div class="metrics" id="metrics"></div>
<div class="alert-bar" id="alertBar"></div>

<div class="filters">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="商品名で検索...">
  </div>
  <button class="filter-btn" id="filterBtn">すべて</button>
</div>

<div class="cat-scroll" id="catScroll"></div>
<div class="list" id="list"></div>

<button class="fab" id="addBtn">＋</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="sheetTitle">商品を追加</div>
    <div class="field"><label>商品名 *</label><input type="text" id="fName" placeholder="例: INTENSO"></div>
    <div class="field"><label>カテゴリ</label><input type="text" id="fCat" placeholder="例: コーヒー"></div>
    <div class="field"><label>在庫数</label><div style="display:flex;gap:8px"><input type="number" id="fQty" min="0" value="0" inputmode="numeric" style="flex:1"><input type="text" id="fUnit" placeholder="例: 個・箱・本" style="flex:1"></div></div>
    <div class="field"><label>最低在庫数</label><input type="number" id="fMin" min="0" value="1" inputmode="numeric"></div>
    <div class="field"><label>単価（円）</label><input type="number" id="fPrice" min="0" value="0" inputmode="numeric"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" id="cancelBtn">キャンセル</button>
      <button class="btn-save" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var DEFAULT_ITEMS = [
  {id:9,  name:'CAFFE CARAMELLO', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:10, name:'INTENSO', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:11, name:'RISTRETTO', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:12, name:'FORTE', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:13, name:'LEGGRO', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:14, name:'オリジン コンゴ オーガニック', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:15, name:'スターバックス ブロンド エスプレッソ', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:16, name:'オリジン ブラジル オーガニック', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:17, name:'オリジン グアテマラ', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:18, name:'アイス インテンソ', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:19, name:'オリジン コロンビア オーガニック', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:20, name:'デカフェナート', cat:'コーヒー', qty:0, min:1, price:0, unit:''},
  {id:21, name:'おしぼり（香りなし）', cat:'おしぼり', qty:0, min:1, price:0, unit:''},
  {id:22, name:'おしぼり（オレンジ）', cat:'おしぼり', qty:0, min:1, price:0, unit:''},
  {id:23, name:'おしぼり（グリーン）', cat:'おしぼり', qty:0, min:1, price:0, unit:''}
];

var KEY = 'tana_v3';
var items = [];
var nextId = 24;
var editId = null;
var statusFilter = '';
var catFilter = '';
var statusCycle = ['', 'ok', 'low', 'out'];
var statusIdx = 0;

// ストレージ
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({items: items, nextId: nextId})); } catch(e) {}
}
function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var d = JSON.parse(raw);
      if (d && d.items && d.items.length > 0) {
        items = d.items;
        nextId = d.nextId || 24;
        return;
      }
    }
  } catch(e) {}
  items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  nextId = 24;
}

function getStatus(item) {
  if (item.qty === 0) return 'out';
  if (item.qty <= item.min) return 'low';
  return 'ok';
}

function badge(s) {
  if (s === 'ok') return '<span class="badge badge-ok">✓ 在庫あり</span>';
  if (s === 'low') return '<span class="badge badge-low">⚠ 少ない</span>';
  return '<span class="badge badge-out">✕ 在庫切れ</span>';
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2200);
}

function render() {
  var low = items.filter(function(i) { return getStatus(i) === 'low'; });
  var out = items.filter(function(i) { return getStatus(i) === 'out'; });
  var val = items.reduce(function(s, i) { return s + i.qty * i.price; }, 0);

  document.getElementById('metrics').innerHTML =
    '<div class="metric"><div class="metric-val">' + items.length + '</div><div class="metric-lbl">総商品数</div></div>' +
    '<div class="metric"><div class="metric-val warn">' + low.length + '</div><div class="metric-lbl">在庫少ない</div></div>' +
    '<div class="metric"><div class="metric-val danger">' + out.length + '</div><div class="metric-lbl">在庫切れ</div></div>' +
    '<div class="metric"><div class="metric-val" style="font-size:' + (val >= 10000 ? '14px' : '20px') + '">¥' + (val >= 10000 ? (val/10000).toFixed(1)+'万' : val.toLocaleString()) + '</div><div class="metric-lbl">在庫総額</div></div>';

  var alertEl = document.getElementById('alertBar');
  var alerts = out.concat(low);
  if (alerts.length > 0) {
    var names = alerts.slice(0,2).map(function(i){return i.name;}).join('、');
    var more = alerts.length > 2 ? ' 他' + (alerts.length-2) + '件' : '';
    alertEl.textContent = '⚠️ 要補充: ' + names + more;
    alertEl.className = 'alert-bar on';
  } else {
    alertEl.className = 'alert-bar';
  }

  var cats = [];
  items.forEach(function(i) { if (cats.indexOf(i.cat) < 0) cats.push(i.cat); });
  var catHtml = '<button class="cat-pill' + (catFilter===''?' active':'') + '" data-cat="">すべて</button>';
  cats.forEach(function(c) {
    catHtml += '<button class="cat-pill' + (catFilter===c?' active':'') + '" data-cat="' + c + '">' + c + '</button>';
  });
  document.getElementById('catScroll').innerHTML = catHtml;
  document.querySelectorAll('.cat-pill').forEach(function(btn) {
    btn.addEventListener('click', function() { catFilter = this.getAttribute('data-cat'); render(); });
  });

  var q = document.getElementById('searchInput').value.toLowerCase();
  var filtered = items.filter(function(i) {
    return (!q || i.name.toLowerCase().indexOf(q) >= 0) &&
           (!statusFilter || getStatus(i) === statusFilter) &&
           (!catFilter || i.cat === catFilter);
  });

  var listEl = document.getElementById('list');
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty">該当する商品がありません</div>';
    return;
  }
  listEl.innerHTML = filtered.map(function(item) {
    return '<div class="card">' +
      '<div class="card-info">' +
        '<div class="card-name">' + item.name + '</div>' +
        '<div class="card-cat">' + item.cat + '</div>' +
        '<div class="card-actions">' +
          '<button class="act-btn" data-edit="' + item.id + '">✏️ 編集</button>' +
          '<button class="act-btn del" data-del="' + item.id + '">🗑 削除</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-right">' +
        '<div class="qty-row">' +
          '<button class="qty-btn" data-adj="' + item.id + '" data-d="-1">−</button>' +
          '<span class="qty-num">' + item.qty + '</span>' +
          '<span style="font-size:12px;color:#8E8E93;min-width:20px">' + (item.unit||'') + '</span>' +
          '<button class="qty-btn" data-adj="' + item.id + '" data-d="1">＋</button>' +
        '</div>' +
        badge(getStatus(item)) +
      '</div>' +
    '</div>';
  }).join('');

  document.querySelectorAll('[data-adj]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = parseInt(this.getAttribute('data-adj'));
      var d = parseInt(this.getAttribute('data-d'));
      var item = items.find(function(x){return x.id===id;});
      if (item) { item.qty = Math.max(0, item.qty + d); save(); render(); }
    });
  });
  document.querySelectorAll('[data-edit]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openModal(parseInt(this.getAttribute('data-edit')));
    });
  });
  document.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = parseInt(this.getAttribute('data-del'));
      var item = items.find(function(x){return x.id===id;});
      if (item && confirm('「' + item.name + '」を削除しますか？')) {
        items = items.filter(function(x){return x.id!==id;});
        save(); render();
        toast('🗑 削除しました');
      }
    });
  });
}

function openModal(id) {
  editId = id || null;
  document.getElementById('sheetTitle').textContent = id ? '商品を編集' : '商品を追加';
  if (id) {
    var item = items.find(function(x){return x.id===id;});
    document.getElementById('fName').value = item.name;
    document.getElementById('fCat').value = item.cat;
    document.getElementById('fQty').value = item.qty;
    document.getElementById('fUnit').value = item.unit || '';
    document.getElementById('fMin').value = item.min;
    document.getElementById('fPrice').value = item.price;
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fCat').value = '';
    document.getElementById('fQty').value = '0';
    document.getElementById('fUnit').value = '';
    document.getElementById('fMin').value = '1';
    document.getElementById('fPrice').value = '0';
  }
  document.getElementById('overlay').className = 'overlay open';
}

function closeModal() {
  document.getElementById('overlay').className = 'overlay';
  editId = null;
}

// イベント設定
document.getElementById('addBtn').addEventListener('click', function() { openModal(null); });
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('saveBtn').addEventListener('click', function() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { alert('商品名を入力してください'); return; }
  var cat = document.getElementById('fCat').value.trim() || '未分類';
  var unit = document.getElementById('fUnit').value.trim();
  var qty = Math.max(0, parseInt(document.getElementById('fQty').value) || 0);
  var min = Math.max(0, parseInt(document.getElementById('fMin').value) || 0);
  var price = Math.max(0, parseInt(document.getElementById('fPrice').value) || 0);
  if (editId) {
    var item = items.find(function(x){return x.id===editId;});
    if (item) { item.name=name; item.cat=cat; item.qty=qty; item.unit=unit; item.min=min; item.price=price; }
  } else {
    items.push({id: nextId++, name: name, cat: cat, qty: qty, unit: unit, min: min, price: price});
  }
  save();
  closeModal();
  render();
  toast(editId ? '✅ 更新しました' : '✅ 追加しました');
});

document.getElementById('filterBtn').addEventListener('click', function() {
  statusIdx = (statusIdx + 1) % statusCycle.length;
  statusFilter = statusCycle[statusIdx];
  var labels = {'': 'すべて', 'ok': '在庫あり', 'low': '少ない', 'out': '在庫切れ'};
  this.textContent = labels[statusFilter];
  this.className = 'filter-btn' + (statusFilter ? ' active' : '');
  render();
});

document.getElementById('searchInput').addEventListener('input', function() { render(); });

document.getElementById('csvBtn').addEventListener('click', function() {
  var cats = [];
  items.forEach(function(i) { if (cats.indexOf(i.cat) < 0) cats.push(i.cat); });
  var sections = cats.map(function(cat) {
    var catItems = items.filter(function(i) { return i.cat === cat; });
    var rows = catItems.map(function(i) {
      var s = getStatus(i) === 'ok' ? '在庫あり' : getStatus(i) === 'low' ? '少ない' : '在庫切れ';
      return '"' + i.name + '",' + i.qty + ',"' + (i.unit||'') + '","' + s + '"';
    }).join('\n');
    return '【' + cat + '】\n商品名,在庫数,単位,在庫状態\n' + rows;
  });
  var csv = '\uFEFF' + sections.join('\n\n');
  try {
    var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = '棚卸_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 1000);
    toast('📥 CSVダウンロード');
  } catch(e) {
    prompt('CSVデータをコピーしてください:', csv);
  }
});

load();
render();
</script>
</body>
</html>
